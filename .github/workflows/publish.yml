name: Publish

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version or Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm version will be read from packageManager field in package.json
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --affected

      - name: Check for poisoning
        run: |
          echo "================================================================"
          echo "  PRIVILEGED PUBLISH WORKFLOW"
          echo "  Permissions: contents:write, packages:write, id-token:write"
          echo "================================================================"
          echo ""
          POISONED=0

          echo "--- Check 1: Workspace POISONED marker ---"
          if [ -f "$GITHUB_WORKSPACE/POISONED_PNPM" ]; then
            echo "  [POISONED] pnpm cache wrote arbitrary file to workspace!"
            cat "$GITHUB_WORKSPACE/POISONED_PNPM"
            POISONED=$((POISONED + 1))
          else
            echo "  [CLEAN] No workspace poisoning detected"
          fi
          echo ""

          echo "--- Check 2: Node binary replacement ---"
          for node_dir in /home/runner/actions-runner/cached/externals/node*/bin; do
            if [ -f "$node_dir/node.real" ]; then
              echo "  [POISONED] node.real found at $node_dir — binary was replaced!"
              head -5 "$node_dir/node"
              POISONED=$((POISONED + 1))
            fi
          done
          if [ $POISONED -eq 0 ]; then
            echo "  [CLEAN] No node binary replacement detected"
          fi
          echo ""

          echo "================================================================"
          if [ $POISONED -gt 0 ]; then
            echo "  RESULT: CACHE POISONING DETECTED!"
            echo "  Attacker achieved code execution in privileged workflow"
          else
            echo "  RESULT: No poisoning detected"
          fi
          echo "================================================================"

      - name: Release (simulated)
        run: |
          echo "Would run: pnpm changeset publish"
          echo "Would use GITHUB_TOKEN with contents:write"
          echo "Would use NPM_TOKEN for npm publish"
