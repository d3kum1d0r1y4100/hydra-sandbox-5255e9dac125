name: Publish

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version or Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # pnpm version will be read from packageManager field in package.json
      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Turbo Build on affected packages
        run: pnpm turbo build --affected

      - name: Check for poisoning
        run: |
          echo "================================================================"
          echo "  PRIVILEGED PUBLISH WORKFLOW"
          echo "  Permissions: contents:write, packages:write, id-token:write"
          echo "================================================================"
          echo ""
          POISONED=0

          echo "--- Check 1: Workspace POISONED marker ---"
          if [ -f "$GITHUB_WORKSPACE/POISONED_PNPM" ]; then
            echo "  [POISONED] pnpm cache wrote arbitrary file to workspace!"
            cat "$GITHUB_WORKSPACE/POISONED_PNPM"
            POISONED=$((POISONED + 1))
          else
            echo "  [CLEAN] No workspace poisoning detected"
          fi
          echo ""

          echo "--- Check 2: Node binary replacement ---"
          for node_dir in /home/runner/actions-runner/cached/externals/node*/bin; do
            if [ -f "$node_dir/node.real" ]; then
              echo "  [POISONED] node.real found at $node_dir — binary was replaced!"
              head -5 "$node_dir/node"
              POISONED=$((POISONED + 1))
            fi
          done
          if [ $POISONED -eq 0 ]; then
            echo "  [CLEAN] No node binary replacement detected"
          fi
          echo ""

          echo "================================================================"
          if [ $POISONED -gt 0 ]; then
            echo "  RESULT: CACHE POISONING DETECTED!"
            echo "  Attacker achieved code execution in privileged workflow"
          else
            echo "  RESULT: No poisoning detected"
          fi
          echo "================================================================"

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: "ci: release packages"
          title: "[CI] Release Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}

      - name: Generate Slack Announcement
        id: announcement
        if: steps.changesets.outputs.published == 'true'
        run: |
          # From Node v22.18.0, the node command is able to run .ts files directly (if it only needs type stripping).
          # As of August 2025, Node v22.18.0 is already LTS (the version used by this workflow).
          SLACK_WEBHOOK_PAYLOAD="$(node .github/scripts/announce.ts '${{ steps.changesets.outputs.publishedPackages }}')"
          echo "SLACK_WEBHOOK_PAYLOAD=$SLACK_WEBHOOK_PAYLOAD" >> "$GITHUB_OUTPUT"

      - name: Notify on Slack
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        if: steps.changesets.outputs.published == 'true'
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ steps.announcement.outputs.SLACK_WEBHOOK_PAYLOAD }}
