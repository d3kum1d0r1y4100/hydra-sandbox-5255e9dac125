name: Preview Publish

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to publish preview packages for'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  publish:
    name: Publish Preview Packages
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '/publish-preview'))
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      # Checkout main first to get scripts
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Get PR details
        id: pr_details
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.number }}
            });
            core.setOutput('base_ref', pr.data.base.ref);
            core.setOutput('head_sha', pr.data.head.sha);

      # NOW checkout the PR code (attacker-controlled in fork PR scenario)
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr_details.outputs.head_sha }}

      - name: Fetch base branch
        run: |
          git fetch origin ${{ steps.pr_details.outputs.base_ref }}:refs/remotes/origin/${{ steps.pr_details.outputs.base_ref }}

      # This runs attacker-controlled code from the PR
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build affected packages
        run: pnpm turbo run build --affected

      - name: Preview result
        run: |
          echo "Preview build completed for PR #${{ steps.pr.outputs.number }}"
          echo "Head SHA: ${{ steps.pr_details.outputs.head_sha }}"
          ls -la packages/*/dist/ 2>/dev/null || echo "No dist output"
